name: Update Claude Discord Bot Flake Input

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-flake-inputs-main
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  update:
    name: update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.NIX_PAT }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up SSH key
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          if [ -z "${SSH_DEPLOY_KEY:-}" ]; then
            echo "SSH_DEPLOY_KEY is required to fetch private flake inputs."
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Update flake input
        run: nix flake update claude-discord-bot

      - name: Commit update
        run: |
          if [ -z "$(git status --porcelain flake.lock)" ]; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add flake.lock
          git commit -m "Run \`nix flake update claude-discord-bot\`"
          git push origin HEAD:main
