name: Nix CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  enumerate-checks:
    name: Enumerate checks
    runs-on: ubuntu-latest

    outputs:
      checks: ${{ steps.checks.outputs.checks }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up SSH key
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          if [ -z "${SSH_DEPLOY_KEY:-}" ]; then
            echo "SSH_DEPLOY_KEY is required to fetch private flake inputs."
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Enumerate check outputs
        id: checks
        run: |
          checks="$(nix eval --json '.#checks.x86_64-linux' --apply builtins.attrNames)"
          echo "checks=$checks" >> "$GITHUB_OUTPUT"

  check:
    name: Run ${{ matrix.check }}
    needs: enumerate-checks
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        check: ${{ fromJSON(needs.enumerate-checks.outputs.checks) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up SSH key
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          if [ -z "${SSH_DEPLOY_KEY:-}" ]; then
            echo "SSH_DEPLOY_KEY is required to fetch private flake inputs."
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Run check
        env:
          CHECK: ${{ matrix.check }}
        run: |
          nix build --print-build-logs --no-link \
            ".#checks.x86_64-linux.${CHECK}"
