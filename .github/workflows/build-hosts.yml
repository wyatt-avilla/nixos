name: Build Hosts

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

jobs:
  hosts:
    name: Enumerate hosts
    runs-on: ubuntu-latest

    outputs:
      hosts: ${{ steps.hosts.outputs.hosts }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up SSH key
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          if [ -z "${SSH_DEPLOY_KEY:-}" ]; then
            echo "SSH_DEPLOY_KEY is required to fetch private flake inputs."
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Enumerate host outputs
        id: hosts
        run: |
          hosts="$(nix eval --json '.#nixosConfigurations' --apply builtins.attrNames)"
          echo "hosts=$hosts" >> "$GITHUB_OUTPUT"

  build:
    name: Build hosts
    needs: hosts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Nix build cache
        id: nix-cache
        uses: actions/cache/restore@v4
        with:
          path: .nix-build-cache
          key: nix-hosts-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ github.sha }}
          restore-keys: |
            nix-hosts-${{ runner.os }}-${{ hashFiles('flake.lock') }}-
            nix-hosts-${{ runner.os }}-

      - name: Set up SSH key
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
        run: |
          if [ -z "${SSH_DEPLOY_KEY:-}" ]; then
            echo "SSH_DEPLOY_KEY is required to fetch private flake inputs."
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Build hosts
        env:
          HOSTS: ${{ needs.hosts.outputs.hosts }}
        run: |
          mkdir -p .nix-build-cache

          mapfile -t build_targets < <(
            jq -r '.[] | ".#nixosConfigurations.\(.).config.system.build.toplevel"' <<< "$HOSTS"
          )

          cache_args=()
          if [ -f .nix-build-cache/nix-cache-info ]; then
            cache_args+=(--extra-substituters "file://$PWD/.nix-build-cache?trusted=1")
          fi

          nix build --print-build-logs --no-link \
            "${cache_args[@]}" \
            "${build_targets[@]}"

          nix copy --to "file://$PWD/.nix-build-cache?compression=zstd" \
            "${build_targets[@]}"

      - name: Save Nix build cache
        if: always() && steps.nix-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .nix-build-cache
          key: nix-hosts-${{ runner.os }}-${{ hashFiles('flake.lock') }}-${{ github.sha }}

  deploy:
    name: Deploy hosts
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy hosts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
          DEPLOY_WEBHOOK_START_URL: https://deploy.wyatt.wtf/hooks/nixos-deploy-start
          DEPLOY_WEBHOOK_STATUS_URL: https://deploy.wyatt.wtf/hooks/nixos-deploy-status
        run: |
          if [ -z "${DEPLOY_WEBHOOK_SECRET:-}" ]; then
            echo "DEPLOY_WEBHOOK_SECRET is required to trigger deployment."
            exit 1
          fi

          python .github/scripts/deploy-hosts.py
